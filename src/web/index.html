<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-DASHENG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; }

  /* ── 侧边栏 ── */
  #sidebar { width: 260px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; }
  #sidebar-header { padding: 12px 16px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; justify-content: space-between; }
  #sidebar-header h2 { font-size: 15px; color: #e94560; }
  #new-chat { padding: 4px 10px; border-radius: 6px; border: 1px solid #0f3460; background: transparent; color: #888; font-size: 12px; cursor: pointer; }
  #new-chat:hover { border-color: #e94560; color: #e94560; }
  #thread-list { flex: 1; overflow-y: auto; padding: 8px; }
  .thread-item { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #aaa; display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .thread-item:hover { background: #1e2a4a; color: #e0e0e0; }
  .thread-item.active { background: #0f3460; color: #fff; }
  .thread-item .del { color: #555; font-size: 11px; display: none; padding: 2px 4px; }
  .thread-item:hover .del { display: inline; }
  .thread-item .del:hover { color: #e94560; }

  /* ── Dashboard 面板 ── */
  #dashboard { padding: 12px 16px; border-top: 1px solid #0f3460; }
  #dashboard h3 { font-size: 12px; color: #666; margin-bottom: 8px; text-transform: uppercase; }
  .dash-card { background: #1a1a2e; border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; font-size: 12px; }
  .dash-card .label { color: #666; font-size: 11px; }
  .dash-card .value { color: #e0e0e0; font-weight: 600; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.ok { background: #4caf50; }
  .status-dot.err { background: #f44336; }
  .status-dot.warn { background: #ff9800; }

  /* ── 主区域 ── */
  #main { flex: 1; display: flex; flex-direction: column; }
  #header { padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 10px; }
  #header h1 { font-size: 18px; color: #e94560; }
  #header span { font-size: 12px; color: #888; flex: 1; }
  #clear { padding: 6px 12px; border-radius: 6px; border: 1px solid #0f3460; background: transparent; color: #888; font-size: 12px; cursor: pointer; }
  #clear:hover { border-color: #e94560; color: #e94560; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #0f3460; color: #fff; }
  .msg.ai { align-self: flex-start; background: #1e2a4a; color: #e0e0e0; }
  .msg.tool { align-self: flex-start; background: #2a1a3a; color: #a080c0; font-size: 12px; font-family: monospace; }
  .msg.system { align-self: center; background: transparent; color: #555; font-size: 12px; }
  #input-area { padding: 12px 20px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 10px; }
  #input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; resize: none; max-height: 120px; }
  #input:focus { border-color: #e94560; }
  #send { padding: 10px 20px; border-radius: 8px; border: none; background: #e94560; color: #fff; font-size: 14px; cursor: pointer; font-weight: bold; }
  #send:hover { background: #c73652; }
  #send:disabled { background: #555; cursor: not-allowed; }
  .typing { align-self: flex-start; padding: 10px 14px; color: #888; font-style: italic; }
  .msg.reasoning { align-self: flex-start; background: #1a2a1a; color: #a0c0a0; font-size: 12px; width: 100%; max-width: 100%; padding: 0; border: 1px solid #2a4a2a; border-radius: 8px; overflow: hidden; }
  .reasoning-header { padding: 6px 12px; cursor: pointer; user-select: none; display: flex; justify-content: space-between; align-items: center; background: #1e3a1e; }
  .reasoning-header:hover { background: #2a4a2a; }
  .reasoning-body { padding: 8px 12px; white-space: pre-wrap; word-break: break-word; display: none; max-height: 300px; overflow-y: auto; }
  .reasoning-body.open { display: block; }
</style>
</head>
<body>

<!-- 侧边栏 -->
<div id="sidebar">
  <div id="sidebar-header">
    <h2>💬 对话</h2>
    <button id="new-chat" onclick="newThread()">+ 新对话</button>
  </div>
  <div id="thread-list"></div>

  <!-- Dashboard -->
  <div id="dashboard">
    <h3>📊 系统状态</h3>
    <div class="dash-card" id="dash-agent">
      <div class="label">Agent API</div>
      <div class="value"><span class="status-dot warn" id="dot-agent"></span><span id="val-agent">检测中...</span></div>
    </div>
    <div class="dash-card" id="dash-model">
      <div class="label">模型</div>
      <div class="value" id="val-model">-</div>
    </div>
    <div class="dash-card" id="dash-ctx">
      <div class="label">上下文长度</div>
      <div class="value" id="val-ctx">-</div>
    </div>
    <div class="dash-card" id="dash-gateway">
      <div class="label">Gateway (QQ/微信)</div>
      <div class="value"><span class="status-dot err" id="dot-gateway"></span><span id="val-gateway">离线</span></div>
    </div>
    <div class="dash-card" id="dash-uptime">
      <div class="label">运行时间</div>
      <div class="value" id="val-uptime">-</div>
    </div>
  </div>
</div>

<!-- 主区域 -->
<div id="main">
  <div id="header">
    <h1>AI-DASHENG</h1>
    <span id="thread-title">选择或创建对话</span>
    <button id="clear" onclick="clearChat()">清除当前对话</button>
  </div>
  <div id="chat"></div>
  <div id="input-area">
    <textarea id="input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
    <button id="send">发送</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
let busy = false;
let currentThread = 'default';

// ── Dashboard 刷新 ──────────────────────────────────────

async function refreshStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    if (data.error) {
      document.getElementById('dot-agent').className = 'status-dot err';
      document.getElementById('val-agent').textContent = '离线';
      return;
    }
    // Agent
    const a = data.agent || {};
    document.getElementById('dot-agent').className = 'status-dot ok';
    document.getElementById('val-agent').textContent = '运行中';
    document.getElementById('val-model').textContent = a.model || '-';
    document.getElementById('val-ctx').textContent = a.context_length ? (a.context_length / 1000) + 'k' : '-';
    document.getElementById('val-uptime').textContent = formatUptime(a.uptime || 0);
    // Gateway
    const g = data.gateway || {};
    document.getElementById('dot-gateway').className = 'status-dot ' + (g.connected ? 'ok' : 'err');
    document.getElementById('val-gateway').textContent = g.connected ? '在线' : '离线';
  } catch (e) {
    document.getElementById('dot-agent').className = 'status-dot err';
    document.getElementById('val-agent').textContent = '离线';
  }
}

function formatUptime(s) {
  if (s < 60) return s + '秒';
  if (s < 3600) return Math.floor(s/60) + '分' + (s%60) + '秒';
  return Math.floor(s/3600) + '时' + Math.floor((s%3600)/60) + '分';
}

setInterval(refreshStatus, 10000);
refreshStatus();

// ── 会话管理 ────────────────────────────────────────────

async function loadThreads() {
  try {
    const res = await fetch('/api/threads');
    const data = await res.json();
    const list = document.getElementById('thread-list');
    list.innerHTML = '';
    (data.threads || []).forEach(t => {
      const div = document.createElement('div');
      div.className = 'thread-item' + (t.thread_id === currentThread ? ' active' : '');
      const title = t.title || t.thread_id;
      div.innerHTML = `<span onclick="switchThread('${t.thread_id}', '${title.replace(/'/g, "\\'")}')">${title}</span><span class="del" onclick="event.stopPropagation();deleteThread('${t.thread_id}')">✕</span>`;
      list.appendChild(div);
    });
  } catch (e) {}
}

async function newThread() {
  try {
    const res = await fetch('/api/new_thread', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({title: '新对话'})
    });
    const data = await res.json();
    if (data.thread_id) {
      currentThread = data.thread_id;
      chat.innerHTML = '';
      document.getElementById('thread-title').textContent = data.title || data.thread_id;
      loadThreads();
    }
  } catch (e) {}
}

async function switchThread(tid, title) {
  currentThread = tid;
  document.getElementById('thread-title').textContent = title || tid;
  await loadHistory(tid);
  loadThreads();
}

async function deleteThread(tid) {
  if (!confirm('确定删除此对话？')) return;
  try {
    await fetch('/api/threads/' + tid, { method: 'DELETE' });
    if (tid === currentThread) {
      currentThread = 'default';
      chat.innerHTML = '';
      document.getElementById('thread-title').textContent = '选择或创建对话';
    }
    loadThreads();
  } catch (e) {}
}

loadThreads();
// 页面加载时自动加载最近一个会话的历史消息
(async () => {
  try {
    const res = await fetch('/api/threads');
    const data = await res.json();
    const threads = data.threads || [];
    if (threads.length > 0) {
      const latest = threads[0];
      currentThread = latest.thread_id;
      document.getElementById('thread-title').textContent = latest.title || latest.thread_id;
      await loadHistory(currentThread);
    }
  } catch (e) {}
  loadThreads();
})();

async function loadHistory(tid) {
  chat.innerHTML = '';
  try {
    const res = await fetch('/api/threads/' + tid);
    const data = await res.json();
    (data.messages || []).forEach(m => {
      if (m.role === 'human') addMsg(m.content, 'user');
      else if (m.role === 'ai') addMsg(m.content, 'ai');
      else if (m.role === 'tool') {
        const name = m.tool_name || 'tool';
        const content = m.content ? m.content.substring(0, 300) : '';
        addMsg('🔧 ' + name + (content ? ': ' + content : ''), 'tool');
      }
    });
    chat.scrollTop = chat.scrollHeight;
  } catch (e) {}
}

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function clearChat() {
  try {
    await fetch('/api/clear?thread_id=' + encodeURIComponent(currentThread));
    chat.innerHTML = '';
    addMsg('对话已清除', 'system');
  } catch(e) {}
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || busy) return;
  busy = true;
  sendBtn.disabled = true;
  input.value = '';
  addMsg(text, 'user');

  // 如果没有会话，自动创建
  if (currentThread === 'default') {
    try {
      const res = await fetch('/api/new_thread', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title: text.substring(0, 20)})
      });
      const data = await res.json();
      if (data.thread_id) {
        currentThread = data.thread_id;
        document.getElementById('thread-title').textContent = text.substring(0, 20);
        loadThreads();
      }
    } catch (e) {}
  }

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.id = 'typing-indicator';
  typing.textContent = '思考中...';
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, thread_id: currentThread})
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let event_type = '';
    let aiDiv = null;

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop(); // 保留未完成的行
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        if (trimmed.startsWith('event: ')) {
          event_type = trimmed.slice(7);
        } else if (trimmed.startsWith('data: ')) {
          let data;
          try { data = JSON.parse(trimmed.slice(6)); } catch(e) { continue; }
          if (event_type === 'status') {
            if (data.step === 'thinking') {
              typing.textContent = '🤔 思考中...';
            } else if (data.step === 'tool_call') {
              typing.textContent = '🔧 调用 ' + data.tool + '...';
            } else if (data.step === 'tool_done') {
              typing.textContent = '✅ ' + data.tool + ' 完成';
            } else if (data.step === 'reasoning') {
              // 思考过程：显示在可折叠气泡中
              let rDiv = document.getElementById('reasoning-bubble');
              if (!rDiv) {
                rDiv = document.createElement('div');
                rDiv.id = 'reasoning-bubble';
                rDiv.className = 'msg reasoning';
                rDiv.innerHTML = '<div class="reasoning-header" onclick="toggleReasoning()">🧠 思考过程 <span id="reasoning-toggle">展开</span></div><div class="reasoning-body" id="reasoning-body"></div>';
                chat.insertBefore(rDiv, typing);
                chat.scrollTop = chat.scrollHeight;
              }
              const body = document.getElementById('reasoning-body');
              body.textContent += data.content || '';
              chat.scrollTop = chat.scrollHeight;
            }
          } else if (event_type === 'result') {
            chat.removeChild(typing);
            // 清理 reasoning 气泡
            const rDiv = document.getElementById('reasoning-bubble');
            if (rDiv) rDiv.remove();
            if (data.tool_calls) {
              data.tool_calls.forEach(tc => {
                addMsg('🔧 ' + tc.name + '(' + JSON.stringify(tc.args) + ')', 'tool');
              });
            }
            if (data.response) {
              aiDiv = addMsg(data.response, 'ai');
            }
          } else if (event_type === 'error') {
            chat.removeChild(typing);
            const rDiv = document.getElementById('reasoning-bubble');
            if (rDiv) rDiv.remove();
            addMsg('⚠️ ' + (data.message || '未知错误'), 'system');
          }
        }
      }
    }
  } catch(e) {
    if (typing.parentNode) chat.removeChild(typing);
    addMsg('连接失败: ' + e.message, 'system');
  }
  busy = false;
  sendBtn.disabled = false;
}

sendBtn.onclick = sendMessage;
input.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
input.focus();

function toggleReasoning() {
  const body = document.getElementById('reasoning-body');
  const toggle = document.getElementById('reasoning-toggle');
  if (!body || !toggle) return;
  body.classList.toggle('open');
  toggle.textContent = body.classList.contains('open') ? '收起' : '展开';
}
</script>
</body>
</html>
